name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tumpa-cli
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: tumpa-cli

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pcscd libpcsclite-dev pcsc-tools \
            libsqlite3-dev tree gnupg pass git

      # Install the jcecard IFD handler: a virtual OpenPGP smartcard
      # that speaks the full IMPORT KEY APDU flow wecanencrypt needs
      # for --upload-to-card. Same recipe wecanencrypt's own CI uses.
      # The tarball ships the reader driver, the Info.plist bundle,
      # the reader.conf.d entry, and the install script.
      - name: Install jcecard IFD handler
        run: |
          wget https://kushaldas.in/ifd-jcecard-2026-04-25.tar.gz
          echo "0fdbbf02c661dcb7eb5e1c5a7d1d85fe5dd6d971c6e945837026e88976b99387  ifd-jcecard-2026-04-25.tar.gz" | sha256sum -c -
          tar xvf ifd-jcecard-2026-04-25.tar.gz
          cd ifd-jcecard
          sudo ./install-jcecard.sh

      # Start pcscd bound to the jcecard reader. `--disable-polkit` is
      # required on Ubuntu 24.04+ in CI; `JCECARD_STORAGE_DIR` points the
      # virtual card at a persistent state file (default PINs — user
      # 123456, admin 12345678 — on first boot).
      - name: Start pcscd with jcecard
        run: |
          mkdir -p $HOME/.jcecard
          sudo systemctl stop pcscd.socket pcscd.service 2>/dev/null || true
          sudo pkill -9 pcscd 2>/dev/null || true
          sleep 1
          sudo JCECARD_STORAGE_DIR=$HOME/.jcecard \
              /usr/sbin/pcscd --foreground --debug --disable-polkit \
              > /tmp/pcscd_debug.log 2>&1 &
          sleep 5
          pgrep pcscd && echo "pcscd is running"
          pcsc_scan -r

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tumpa-cli/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tumpa-cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Release-shape build and lint. `experimental` is a Cargo
      # feature, default-off; this step guards that end-user builds
      # (no feature) still compile and lint clean. The binaries
      # produced here drive test_keystore.sh and test_git_sign.sh.
      - name: Build tumpa-cli (default, no experimental)
        working-directory: tumpa-cli
        run: cargo build

      - name: Clippy (default)
        working-directory: tumpa-cli
        run: cargo clippy -- -D warnings

      - name: Cargo unit tests (tumpa-cli)
        working-directory: tumpa-cli
        run: cargo test

      - name: Test keystore (test_keystore.sh)
        working-directory: tumpa-cli
        run: ./tests/test_keystore.sh

      - name: Test git commit signing (test_git_sign.sh)
        working-directory: tumpa-cli
        run: ./tests/test_git_sign.sh

      # Rebuild with the experimental feature on. Only this binary
      # has `--upload-to-card` and `--reset-card`; test_upload_card.sh
      # requires it and exits 2 with an explanatory message if run
      # against a default build.
      - name: Build tumpa-cli (--features experimental)
        working-directory: tumpa-cli
        run: cargo build --features experimental

      - name: Clippy (--features experimental)
        working-directory: tumpa-cli
        run: cargo clippy --features experimental -- -D warnings

      # Full --upload-to-card exercise against the jcecard virtual
      # OpenPGP card. Stage A validates the CLI surface; Stage B
      # factory-resets the card, uploads the primary signing key,
      # has tclig sign a commit (including a non-UTF-8 byte), and
      # verifies the signature with both tclig and real gpg.
      #
      # jcecard exposes two readers (Testcard 0000:00000001 + Nitrokey
      # 000F:4E4B0001); pin every card-touching tcli call to the
      # Nitrokey slot via TCLI_CARD_IDENT, otherwise libtumpa's
      # multi-card guard refuses --reset-card / --upload-to-card with
      # `multiple cards connected ...; pass an ident to pick one`.
      # Stage B2's regression case is specifically the Nitrokey ECC
      # upload path, so the Nitrokey slot is the right target.
      - name: Test --upload-to-card + card-signed commit (test_upload_card.sh)
        working-directory: tumpa-cli
        env:
          TCLI_TEST_CARD_UPLOAD: "1"
          TCLI_CARD_IDENT: "000F:4E4B0001"
          ADMIN_PIN: "12345678"
          TUMPA_PASSPHRASE: testpass
        run: ./tests/test_upload_card.sh

      - name: Provision RSA test key for tpass/pass tests
        id: provision_key
        working-directory: tumpa-cli
        env:
          TUMPA_KEYSTORE: ${{ github.workspace }}/ci-keys.db
        run: |
          FP=$(./tests/provision_test_key.sh)
          if [ -z "$FP" ]; then
            echo "ERROR: provision_test_key.sh returned no fingerprint" >&2
            exit 1
          fi
          echo "Provisioned fingerprint: $FP"
          echo "fp=$FP" >> "$GITHUB_OUTPUT"

      - name: Test tcli + pass (test_pass.sh)
        working-directory: tumpa-cli
        env:
          TUMPA_PASSPHRASE: testpass
          TUMPA_KEYSTORE: ${{ github.workspace }}/ci-keys.db
        run: ./tests/test_pass.sh ${{ steps.provision_key.outputs.fp }}

      - name: Test tpass standalone (test_tpass.sh)
        working-directory: tumpa-cli
        env:
          TUMPA_PASSPHRASE: testpass
          TUMPA_KEYSTORE: ${{ github.workspace }}/ci-keys.db
        run: ./tests/test_tpass.sh ${{ steps.provision_key.outputs.fp }}

      - name: Test tpass <-> pass compat (test_tpass_compat.sh)
        working-directory: tumpa-cli
        env:
          TUMPA_PASSPHRASE: testpass
          TUMPA_KEYSTORE: ${{ github.workspace }}/ci-keys.db
        run: ./tests/test_tpass_compat.sh ${{ steps.provision_key.outputs.fp }}

      - name: Upload pcscd debug log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pcscd-debug-log
          path: /tmp/pcscd_debug.log
          retention-days: 1
