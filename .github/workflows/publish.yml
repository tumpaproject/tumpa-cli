name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build release binaries for each platform
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pcscd libpcsclite-dev libsqlite3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tcli dist/
          cp target/${{ matrix.target }}/release/tpass dist/
          cp completions/tpass.bash dist/
          cp completions/tpass.zsh dist/
          cp completions/tpass.fish dist/
          cd dist
          tar czf ../tumpa-cli-${{ matrix.target }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tumpa-cli-${{ matrix.target }}
          path: tumpa-cli-${{ matrix.target }}.tar.gz

  # Create a universal macOS binary from the two arch builds
  macos-universal:
    needs: build
    runs-on: macos-latest

    steps:
      - name: Download x86_64 build
        uses: actions/download-artifact@v4
        with:
          name: tumpa-cli-x86_64-apple-darwin
          path: x86_64

      - name: Download aarch64 build
        uses: actions/download-artifact@v4
        with:
          name: tumpa-cli-aarch64-apple-darwin
          path: aarch64

      - name: Create universal binaries
        run: |
          mkdir -p x86_64-bin aarch64-bin dist
          tar xzf x86_64/tumpa-cli-x86_64-apple-darwin.tar.gz -C x86_64-bin
          tar xzf aarch64/tumpa-cli-aarch64-apple-darwin.tar.gz -C aarch64-bin
          lipo -create x86_64-bin/tcli aarch64-bin/tcli -output dist/tcli
          lipo -create x86_64-bin/tpass aarch64-bin/tpass -output dist/tpass
          cp aarch64-bin/tpass.bash dist/
          cp aarch64-bin/tpass.zsh dist/
          cp aarch64-bin/tpass.fish dist/
          cd dist
          tar czf ../tumpa-cli-universal-apple-darwin.tar.gz *

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: tumpa-cli-universal-apple-darwin
          path: tumpa-cli-universal-apple-darwin.tar.gz

  # Publish to crates.io
  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pcscd libpcsclite-dev libsqlite3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Verify tag matches crate version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match crate version v${version}" >&2
            exit 1
          fi

      - name: Verify publishable package
        run: cargo publish --locked --dry-run

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Create GitHub Release with binaries
  release:
    needs: [build, macos-universal, publish-crate]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tumpa-cli-x86_64-unknown-linux-gnu/tumpa-cli-x86_64-unknown-linux-gnu.tar.gz
            artifacts/tumpa-cli-x86_64-apple-darwin/tumpa-cli-x86_64-apple-darwin.tar.gz
            artifacts/tumpa-cli-aarch64-apple-darwin/tumpa-cli-aarch64-apple-darwin.tar.gz
            artifacts/tumpa-cli-universal-apple-darwin/tumpa-cli-universal-apple-darwin.tar.gz

  # Update Homebrew formula
  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute per-platform tarball SHA256s
        id: sha
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          for triple in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            tarball="artifacts/tumpa-cli-${triple}/tumpa-cli-${triple}.tar.gz"
            if [ ! -f "$tarball" ]; then
              echo "Missing artifact: $tarball" >&2
              exit 1
            fi
            sha=$(sha256sum "$tarball" | cut -d' ' -f1)
            key="${triple//-/_}"
            echo "sha_${key}=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: tumpaproject/homebrew-tumpa-cli
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ steps.sha.outputs.version }}",
              "sha256": {
                "aarch64_apple_darwin":     "${{ steps.sha.outputs.sha_aarch64_apple_darwin }}",
                "x86_64_apple_darwin":      "${{ steps.sha.outputs.sha_x86_64_apple_darwin }}",
                "x86_64_unknown_linux_gnu": "${{ steps.sha.outputs.sha_x86_64_unknown_linux_gnu }}"
              }
            }
