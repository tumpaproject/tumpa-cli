# cargo-audit configuration. Read by `cargo audit` and by the
# `rustsec/audit-check` GitHub Action.
#
# Entries should be reviewed periodically. Remove a line as soon as
# the upstream fix lands.

[advisories]
ignore = [
    # rsa 0.9.x — Marvin Attack: potential key recovery through timing
    # sidechannels in PKCS#1 v1.5 decryption.
    #   https://rustsec.org/advisories/RUSTSEC-2023-0071
    #   https://github.com/RustCrypto/RSA/issues/19
    # No fixed upstream release is available. Pulled in transitively via
    # wecanencrypt, pgp, ssh-key, and ssh-agent-lib.
    "RUSTSEC-2023-0071",

    # rand 0.8.5 — unsound when a *custom* log::Log implementation
    # calls rand::rng() from inside its log() method and a reseed
    # races with that call.
    #   https://rustsec.org/advisories/RUSTSEC-2026-0097
    #   https://github.com/rust-random/rand/pull/1763
    # tumpa-cli uses env_logger (stock implementation, never calls
    # into rand from the logger path), so none of the advisory's
    # preconditions are reachable. Pulled in transitively via
    # pgp -> num-bigint-dig / rsa / dsa and ssh-key; a bump depends
    # on the RustCrypto ecosystem completing its rand 0.9 migration.
    "RUSTSEC-2026-0097",

    # quick-xml 0.37.x — quadratic run time when checking a start tag
    # for duplicate attribute names (parser DoS). Fixed in >=0.41.0.
    #   https://rustsec.org/advisories/RUSTSEC-2026-0194
    # Pulled in via notify-rust -> tauri-winrt-notification, which
    # still pins quick-xml ^0.37 in its latest release (0.7.2). The
    # code is doubly unreachable in tumpa-cli builds: notify-rust is a
    # Linux-only dep here, and tauri-winrt-notification is notify-rust's
    # Windows-only backend, so quick-xml is never compiled into any
    # tumpa-cli artifact. Remove once tauri-winrt-notification moves
    # to quick-xml >=0.41.
    "RUSTSEC-2026-0194",

    # quick-xml 0.37.x — unbounded namespace-declaration allocation in
    # NsReader (memory-exhaustion DoS). Fixed in >=0.41.0.
    #   https://rustsec.org/advisories/RUSTSEC-2026-0195
    # Same chain and same reasoning as RUSTSEC-2026-0194 above:
    # notify-rust is a Linux-only dep of tumpa-cli, and
    # tauri-winrt-notification (which pins quick-xml ^0.37 in its
    # latest release, 0.7.2; even its unreleased main is only on
    # ^0.38) is notify-rust's Windows-only backend, so quick-xml is
    # never compiled into any tumpa-cli artifact. Remove once
    # tauri-winrt-notification moves to quick-xml >=0.41.
    "RUSTSEC-2026-0195",
]
